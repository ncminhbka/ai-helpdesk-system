services:
  # ==================== PostgreSQL + pgvector ====================
  db:
    image: pgvector/pgvector:pg17
    container_name: fpt_helpdesk_db
    restart: unless-stopped
    # Use the root .env for interpolation and container env
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-fpt_helpdesk}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-fpt_helpdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== FastAPI Backend ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fpt_helpdesk_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DB_HOST to point to the db service (not localhost)
      DB_HOST: db
      # Use internal service name for database URLs
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      CHECKPOINT_POSTGRES_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    ports:
      - "8000:8000"
    volumes:
      # Mount docs for ingest.py (if needed inside container)
      - ./docs:/app/docs:ro
    depends_on:
      db:
        condition: service_healthy

  # ==================== React Frontend ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fpt_helpdesk_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
